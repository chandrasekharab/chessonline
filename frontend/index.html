<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/chess-icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chess Insight Engine</title>
    <style>
      /* ── Design tokens: dark (default) ─────────────────────────── */
      :root {
        --bg-app:      #0f172a;
        --bg-nav:      #0a1628;
        --bg-drawer:   #070d1a;
        --bg-surface:  #0e1b2e;
        --bg-card:     #111827;
        --bg-elevated: #1a2540;
        --bg-input:    #0b1526;

        --border:        #1a2540;
        --border-mid:    #1e293b;
        --border-strong: #334155;

        --text-1: #f8fafc;
        --text-2: #e2e8f0;
        --text-3: #94a3b8;
        --text-4: #64748b;
        --text-5: #475569;

        --shadow: 0 8px 32px rgba(0,0,0,0.5);
        --shadow-lg: 0 25px 50px -12px rgba(0,0,0,0.6);
      }

      /* ── Design tokens: light ───────────────────────────────────── */
      html[data-theme="light"] {
        --bg-app:      #f0f4f8;
        --bg-nav:      #ffffff;
        --bg-drawer:   #ffffff;
        --bg-surface:  #f8fafc;
        --bg-card:     #ffffff;
        --bg-elevated: #f1f5f9;
        --bg-input:    #ffffff;

        --border:        #dde3ed;
        --border-mid:    #e2e8f0;
        --border-strong: #cbd5e1;

        --text-1: #0f172a;
        --text-2: #1e293b;
        --text-3: #475569;
        --text-4: #64748b;
        --text-5: #94a3b8;

        --shadow: 0 4px 16px rgba(0,0,0,0.08);
        --shadow-lg: 0 25px 50px -12px rgba(0,0,0,0.12);
      }

      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen,
          Ubuntu, Cantarell, sans-serif;
        background: var(--bg-app);
        color: var(--text-2);
        min-height: 100vh;
        transition: background 0.2s, color 0.2s;
      }
      #root { min-height: 100vh; }

      /* smooth theme transitions for common elements */
      *, *::before, *::after { transition-property: background-color, border-color, color; transition-duration: 0.15s; }

      @keyframes spin   { to { transform: rotate(360deg); } }
      @keyframes bounce {
        0%, 80%, 100% { transform: translateY(0);    opacity: 0.4; }
        40%           { transform: translateY(-5px); opacity: 1; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
