server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Use Docker's embedded DNS so nginx re-resolves 'backend' after container restarts
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $backend http://backend:7000;

    # ── SPA routes that share a prefix with API routes ──────────────────────
    # These must come BEFORE the proxy block so nginx matches them first.

    # /games/<uuid>  →  React GameView page
    # Note: {} quantifiers are not allowed in nginx location regex; use [0-9a-f-]{36} equivalent
    location ~ "^/games/[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$" {
        try_files $uri /index.html;
    }

    # /tutorial and /puzzles are plain React pages (no sub-path on the SPA side)
    location = /tutorial {
        try_files $uri /index.html;
    }
    location = /puzzles {
        try_files $uri /index.html;
    }
    location = /play {
        try_files $uri /index.html;
    }

    # Proxy API requests to backend
    location ~ ^/(auth|games|live|tutorial|puzzles|explanations|health) {
        proxy_pass $backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Proxy Socket.IO (WebSocket + polling)
    location /socket.io/ {
        proxy_pass $backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
}
